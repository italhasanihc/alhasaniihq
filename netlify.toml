# netlify.toml
# Al-Hasna Group — alhasani.iq
# Netlify deployment configuration

[build]
  publish   = "."

# ── Security headers (all responses) ────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://alhasani.iq https://*.netlify.app; frame-src 'none'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"

# ── Static asset caching ─────────────────────────────────────────────
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, no-transform"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, no-transform"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, no-transform"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, no-transform"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, no-transform"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control               = "public, max-age=31536000, no-transform"
    Access-Control-Allow-Origin = "*"

# ── Block PHP and sensitive paths ────────────────────────────────────
[[redirects]]
  from   = "/mail.php"
  to     = "/"
  status = 404
  force  = true

[[redirects]]
  from   = "/*.php"
  to     = "/"
  status = 404
  force  = true

[[redirects]]
  from   = "/.git/*"
  to     = "/"
  status = 404
  force  = true

[[redirects]]
  from   = "/.env"
  to     = "/"
  status = 404
  force  = true

# Serve site logo at /favicon.ico so default browser requests stop 404ing
[[redirects]]
  from   = "/favicon.ico"
  to     = "/alhasna-logo.png"
  status = 200
  force  = true